services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    platform: linux/amd64
    ports:
      - "8000:8000"
    environment:
      LATEX_BIN: pdflatex
    volumes:
      - ./:/app
    command: ["python3", "-m", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
